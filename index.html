<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Water Technology Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-water"></i> Global Water Technology Map</h1>
            <p class="subtitle">Mapping innovation, research, and financing in water technology worldwide</p>
        </header>

        <div class="controls">
            <div class="filter-section">
                <label for="tech-filter">Technology Type:</label>
                <select id="tech-filter">
                    <option value="all">All Technologies</option>
                    <option value="purification">Water Purification</option>
                    <option value="monitoring">Water Monitoring</option>
                    <option value="conservation">Water Conservation</option>
                    <option value="desalination">Desalination</option>
                    <option value="wastewater">Wastewater Treatment</option>
                </select>

                <label for="funding-filter">Funding Range:</label>
                <select id="funding-filter">
                    <option value="all">All Funding</option>
                    <option value="0-1M">$0 - $1M</option>
                    <option value="1M-10M">$1M - $10M</option>
                    <option value="10M+">$10M+</option>
                </select>

                <label for="year-filter">Research Year:</label>
                <select id="year-filter">
                    <option value="all">All Years</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                </select>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <span class="stat-label">Total Projects</span>
                    <span class="stat-value" id="total-projects">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Funding</span>
                    <span class="stat-value" id="total-funding">$0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Active Research</span>
                    <span class="stat-value" id="active-research">0</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="map"></div>
            
            <div class="sidebar">
                <h3>Project Details</h3>
                <div id="project-details" class="project-details">
                    <p class="placeholder">Click on a marker to view project details</p>
                </div>
                
                <h3>Funding Sources</h3>
                <div id="funding-sources" class="funding-sources">
                    <!-- Will be populated dynamically -->
                </div>
            </div>
        </div>

        <div class="research-section">
            <h2><i class="fas fa-flask"></i> Latest Research</h2>
            <div id="research-list" class="research-grid">
                <!-- Will be populated dynamically -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
